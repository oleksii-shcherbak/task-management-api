name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: taskapi
          POSTGRES_PASSWORD: taskapi
          POSTGRES_DB: taskapi_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Use the same database URL for both DATABASE_URL and TEST_DATABASE_URL
      # to ensure that tests run against the correct database.
      DATABASE_URL: postgresql+asyncpg://taskapi:taskapi@localhost:5432/taskapi_test_db
      TEST_DATABASE_URL: postgresql+asyncpg://taskapi:taskapi@localhost:5432/taskapi_test_db
      JWT_SECRET_KEY: ci-test-secret-key-for-testing-only
      REDIS_URL: redis://localhost:6379/0
      TEST_REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
      - run: uv sync --frozen --all-groups
      - run: uv run pytest --cov=app --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
      - run: uv sync --frozen --all-groups
      - run: uv run pip-audit
